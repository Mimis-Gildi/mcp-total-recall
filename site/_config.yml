remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: dark

title: "Total Recall"
subtitle: "Persistent Memory for Synthetic Minds"
description: "MCP server for identity persistence, episodic memory, working context, and inter-instance communication."
url: "https://mimis-gildi.github.io"
baseurl: "/mcp-total-recall"
repository: "Mimis-Gildi/mcp-total-recall"
logo: "/assets/images/logo.jpg"
og_image: "/assets/images/social.jpg"

locale: "en-US"
encoding: "utf-8"

search: true
search_full_content: true
search_provider: lunr
lunr:
  search_within_pages: true

plugins:
  - jekyll-asciidoc
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-paginate-v2
  - jekyll-include-cache
  - jekyll-sitemap

collections:
  adr:
    output: true
    permalink: /decisions/:name/
    order:
      - 0001-architecture-decision-records.adoc
      - 0002-hexagonal-architecture.adoc
      - 0003-stdio-as-primary-transport.adoc
      - 0004-resilient-storage-array.adoc
      - 0005-memory-as-aggregate-root.adoc
      - 0006-events-and-commands-as-message-types.adoc
      - 0007-biological-memory-as-reference-model.adoc
      - 0008-sqlite-as-primary-backing-service.adoc
  design:
    output: true
    permalink: /design/:name/
    order:
      - 0000-about-detailed-design.adoc
      - 0001-what-is-a-port.adoc
      - 0002-what-is-an-adapter.adoc
      - 0003-what-is-an-acl.adoc
      - 0004-hexagon-sides.adoc
      - 0005-tiered-memory.adoc
      - 0006-salience.adoc
      - 0007-synapse.adoc
      - 0008-recall.adoc
      - 0009-cortex.adoc
      - 0010-subconscious.adoc
  catalog:
    output: true
    permalink: /catalog/:name/
    order:
      - 0000-catalog.adoc

pagination:
  enabled: true
  per_page: 10
  permalink: "/page/:num/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: adr
    values:
      layout: single
      author_profile: false
      read_time: true
      share: false
      related: false
      sidebar:
        nav: architecture
  - scope:
      path: ""
      type: design
    values:
      layout: single
      author_profile: false
      read_time: true
      share: false
      related: false
      sidebar:
        nav: architecture
  - scope:
      path: ""
      type: catalog
    values:
      layout: single
      author_profile: false
      read_time: true
      share: false
      related: false
      sidebar:
        nav: architecture

# Default / anonymous author meta
author:
  name: "Mimis Gildi"
  avatar: "/assets/images/logo.jpg"
  bio: "The tree grows."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mimis-Gildi/mcp-total-recall"
    - label: "Project Board"
      icon: "fas fa-fw fa-project-diagram"
      url: "https://github.com/orgs/Mimis-Gildi/projects/6"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mimis-Gildi/mcp-total-recall"
    - label: "Mimis Gildi"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mimis-Gildi"

after_footer_scripts:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js
  - /assets/js/mermaid-init.js

port: 4100
livereload_port: 35829

sass:
  quiet_deps: true

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - "*.swp"
  - ".jekyll-cache"
